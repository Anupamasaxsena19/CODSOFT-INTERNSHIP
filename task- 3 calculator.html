<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f172a;
    font-family:sans-serif;
}

/* Calculator Box */
.calculator{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* Display */
.display{
    width:100%;
    height:60px;
    background:white;
    border-radius:10px;
    margin-bottom:15px;
    text-align:right;
    padding:15px;
    font-size:22px;
    color:black;
}

/* Grid Layout */
.buttons{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
}

/* Buttons */
button{
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#475569;
}

/* Special Buttons */
.equal{
    grid-column:span 2;
    background:#38bdf8;
    color:black;
}

.clear{
    background:#ef4444;
}
</style>
</head>

<body>

<div class="calculator">

<div class="display">0</div>

<div class="buttons">
<button class="clear">C</button>
<button>⌫</button>
<button>%</button>
<button>÷</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button>×</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>-</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>+</button>

<button>0</button>
<button>.</button>
<button class="equal">=</button>
</div>

</div>

</body>
</html>
